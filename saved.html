<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saved History | On This Day</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 🔝 NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="logo" style="text-decoration:none;">On This Day</a>

    <div class="nav-actions">
      <a href="index.html" class="nav-link">Home</a>
      <button id="darkModeToggle">🌙</button>
    </div>
  </nav>


  <!-- ⭐ SAVED SECTION -->
  <section class="saved-container">
    <h1 style="font-family:'Playfair Display'; font-size:42px; text-align:center; margin-bottom:40px;">Your Saved History</h1>
    
    <div id="savedGrid" class="saved-grid">
      <!-- Saved items will inject here -->
    </div>
  </section>


  <!-- 📄 FOOTER -->
  <footer class="footer">
    <p>© 2026 On This Day Explorer</p>
  </footer>


  <!-- JS -->
  <script>
    const savedGrid = document.getElementById("savedGrid");
    const toggleBtn = document.getElementById("darkModeToggle");

    // 🔹 INIT
    window.onload = () => {
      loadTheme();
      renderSaved();
    };

    // 🔹 THEME
    function loadTheme() {
      const saved = localStorage.getItem("theme");
      if (saved === "light") {
        document.body.classList.add("light-mode");
        toggleBtn.textContent = "☀️";
      } else {
        toggleBtn.textContent = "🌙";
      }
    }

    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("light-mode");
      const isLight = document.body.classList.contains("light-mode");
      if (isLight) {
        localStorage.setItem("theme", "light");
        toggleBtn.textContent = "☀️";
      } else {
        localStorage.setItem("theme", "dark");
        toggleBtn.textContent = "🌙";
      }
    });

    // 🔹 RENDER SAVED
    function renderSaved() {
      const favs = JSON.parse(localStorage.getItem("favorites")) || [];
      savedGrid.innerHTML = "";

      if (favs.length === 0) {
        savedGrid.innerHTML = `<p style="text-align:center; color:var(--subtext); width:100%; padding:40px;">No saved items yet. Go back to explore history!</p>`;
        return;
      }

      favs.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "saved-card";

        card.innerHTML = `
          <div class="saved-header">
            <h2 class="saved-year">${item.year}</h2>
          </div>
          
          <p class="saved-text">
            ${item.text}
          </p>
          
          <div class="saved-actions">
            ${
              item.links?.[0]
                ? `<a href="${item.links[0].link}" target="_blank" class="wiki-link">Read more</a>`
                : "<span></span>"
            }
            <button class="remove-btn">Remove</button>
          </div>
        `;

        // 🔹 Remove logic
        const removeBtn = card.querySelector(".remove-btn");
        removeBtn.addEventListener("click", () => {
          removeSaved(item.text);
        });

        savedGrid.appendChild(card);
      });
    }

    // 🔹 REMOVE
    function removeSaved(text) {
      let favs = JSON.parse(localStorage.getItem("favorites")) || [];
      favs = favs.filter(e => e.text !== text);
      localStorage.setItem("favorites", JSON.stringify(favs));
      renderSaved();
    }
  </script>

</body>
</html>
