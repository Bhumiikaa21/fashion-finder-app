<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>On This Day | Historical Explorer</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="logo">On This Day</div>

    <div class="nav-actions">
      <a href="saved.html" class="nav-link">Saved</a>
      <button id="darkModeToggle">🌙</button>
    </div>
  </nav>

  <section class="hero">
    <h1>Explore History by Date</h1>
    <p>Discover events, births, and deaths from any day in history</p>

    <div class="hero-controls">
      <div class="select-wrapper">
        <select id="monthSelect">
          <option value="1">Jan</option>
          <option value="2">Feb</option>
          <option value="3">Mar</option>
          <option value="4">Apr</option>
          <option value="5">May</option>
          <option value="6">Jun</option>
          <option value="7">Jul</option>
          <option value="8">Aug</option>
          <option value="9">Sep</option>
          <option value="10">Oct</option>
          <option value="11">Nov</option>
          <option value="12">Dec</option>
        </select>
      </div>

      <div class="select-wrapper">
        <select id="daySelect"></select>
      </div>

      <button id="todayBtn">Today</button>
    </div>
  </section>

  <div id="stickySection">
    <section class="controls">
      <div class="tabs">
        <button class="tab active" data-type="Events">Events</button>
        <button class="tab" data-type="Births">Births</button>
        <button class="tab" data-type="Deaths">Deaths</button>
      </div>

      <div class="filters">
        <input type="number" id="yearFilter" placeholder="Filter by year (e.g. 1800)" />

        <select id="sort">
          <option value="asc">Old → New</option>
          <option value="desc">New → Old</option>
        </select>

        <input type="text" id="searchInput" placeholder="Search in events..." />
      </div>
    </section>
  </div>

  <section class="timeline-container">
    <div class="timeline-line"></div>
    <div id="timeline"></div>
  </section>

  <div id="loader" class="loader hidden">
    Loading...
  </div>

  <footer class="footer">
    <p>© 2026 On This Day Explorer</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
